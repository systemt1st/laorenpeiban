version: '3.8'

services:
  app:
    build: .
    container_name: elderly-companion
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/companion.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: elderly-companion-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - app

volumes:
  app-data:
  app-logs:
  nginx-certs:
