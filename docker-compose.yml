services:
  app:
    build: .
    container_name: elderly-companion
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /app/data/companion.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
  app-logs:
